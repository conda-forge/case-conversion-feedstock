{% set name = "case-conversion" %}
{% set version = "3.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/case_conversion-{{ version }}.tar.gz
  sha256: 2e5098c5e20d67282a5999531e7797c412daafcf646169e42066e30cba37a097

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - regex >=2016.2.25

test:
  imports:
    - case_conversion
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/AlejandroFrias/case-conversion
  summary: Convert between different types of cases (unicode supported)
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - thewchan
